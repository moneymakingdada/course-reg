<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block subject %}CourseReg{% endblock %}</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #F5F4FE; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    .wrapper { max-width: 560px; margin: 32px auto; }
    .card { background: #ffffff; border-radius: 12px; overflow: hidden; border: 0.5px solid #CECBF6; }
    .header { background: #534AB7; padding: 24px 32px; }
    .header__logo { font-size: 18px; font-weight: 600; color: #ffffff; letter-spacing: -0.3px; }
    .header__logo span { color: #CECBF6; font-weight: 400; }
    .body { padding: 32px; }
    .greeting { font-size: 15px; color: #26215C; font-weight: 500; margin-bottom: 8px; }
    .text { font-size: 14px; color: #555; line-height: 1.7; margin-bottom: 16px; }
    .highlight-box { background: #EEEDFE; border-left: 3px solid #534AB7; border-radius: 6px; padding: 14px 16px; margin-bottom: 20px; }
    .highlight-box__course { font-size: 15px; font-weight: 500; color: #26215C; margin-bottom: 4px; }
    .highlight-box__meta { font-size: 13px; color: #7F77DD; }
    .cta-btn { display: inline-block; padding: 12px 28px; background: #534AB7; color: #ffffff !important; text-decoration: none; border-radius: 8px; font-size: 14px; font-weight: 500; margin-bottom: 20px; }
    .deadline-banner { background: #FAEEDA; border-radius: 8px; padding: 10px 14px; font-size: 13px; color: #633806; margin-bottom: 20px; }
    .divider { height: 0.5px; background: #EEEDFE; margin: 20px 0; }
    .footer { padding: 16px 32px; background: #FAFAFA; }
    .footer__text { font-size: 11px; color: #aaa; line-height: 1.6; }
    .footer__link { color: #534AB7; text-decoration: none; }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="card">
      <div class="header">
        <p class="header__logo">Course<span>Reg</span></p>
      </div>
      <div class="body">
        {% block body %}{% endblock %}
      </div>
      <div class="footer">
        <p class="footer__text">
          You're receiving this because you're enrolled at the university and signed up for CourseReg notifications.<br/>
          <a class="footer__link" href="{{ frontend_url }}/student/waitlist">Manage your waitlists</a> &nbsp;·&nbsp;
          <a class="footer__link" href="{{ frontend_url }}/student/settings">Notification settings</a>
        </p>
      </div>
    </div>
  </div>
</body>
</html>
